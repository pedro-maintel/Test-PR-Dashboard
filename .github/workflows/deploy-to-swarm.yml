name: Fake Deploy to Docker Swarm

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: 'latest'
      environment:
        description: 'Environment to deploy to (default: dev)'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - stag
          - prod

jobs:
  fake-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      ENV_NAME: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Print selected inputs
        run: |
          echo "image_tag=${{ github.event.inputs.image_tag }}"
          echo "environment=${ENV_NAME}"

      - name: Read TEST_PEDRO from GitHub env vars and print it
        env:
          TEST_PEDRO: ${{ vars.TEST_PEDRO }}
        run: |
          echo "TEST_PEDRO=${TEST_PEDRO}"
